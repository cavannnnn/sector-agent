# Render Blueprint - Sector Rotation AI Agent
# https://render.com/docs/blueprint-spec
services:
  # --- Web Service (Flask Dashboard) ---
  - type: web
    name: sector-rotation-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/latest
    autoDeploy: true

  # --- Cron Job (Weekly Auto-Refresh via API call) ---
  - type: cron
    name: sector-weekly-refresh
    runtime: python
    buildCommand: "true"
    startCommand: "curl -X POST https://sector-rotation-agent.onrender.com/api/refresh || true"
    schedule: "0 9 * * 1"  # Every Monday 9:00 UTC
    plan: free
